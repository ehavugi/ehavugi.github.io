<script>
    // --- 1. HIDDEN LIBRARY (Autograd Engine) ---
    const HIDDEN_LIB = `
import random
import math

params = {}
csv_data = "No CSV generated. Use csv_data = '...'"
plot_url = "" 

class Value:
    def __init__(self, data, _children=(), _op=''):
        self.data = data
        self.grad = 0
        self._backward = lambda: None
        self._prev = set(_children)

    def __add__(self, other):
        other = other if isinstance(other, Value) else Value(other)
        out = Value(self.data + other.data, (self, other), '+')
        def _backward():
            self.grad += out.grad
            other.grad += out.grad
        out._backward = _backward
        return out

    def __mul__(self, other):
        other = other if isinstance(other, Value) else Value(other)
        out = Value(self.data * other.data, (self, other), '*')
        def _backward():
            self.grad += other.data * out.grad
            other.grad += self.data * out.grad
        out._backward = _backward
        return out

    def __pow__(self, other):
        assert isinstance(other, (int, float))
        out = Value(self.data**other, (self,), f'**{other}')
        def _backward():
            self.grad += (other * self.data**(other-1)) * out.grad
        out._backward = _backward
        return out

    def relu(self):
        out = Value(0 if self.data < 0 else self.data, (self,), 'ReLU')
        def _backward():
            self.grad += (out.data > 0) * out.grad
        out._backward = _backward
        return out

    def backward(self):
        topo = []
        visited = set()
        def build(v):
            if v not in visited:
                visited.add(v)
                for child in v._prev: build(child)
                topo.append(v)
        build(self)
        self.grad = 1
        for v in reversed(topo): v._backward()

    def __neg__(self): return self * -1
    def __radd__(self, other): return self + other
    def __sub__(self, other): return self + (-other)
    def __rmul__(self, other): return self * other
    def __repr__(self): return f"Value({self.data:.4f})"

class Module:
    def zero_grad(self):
        for p in self.parameters(): p.grad = 0
    def parameters(self): return []

class Linear(Module):
    def __init__(self, nin, nout):
        self.w = [[Value(random.uniform(-1,1)) for _ in range(nin)] for _ in range(nout)]
        self.b = [Value(random.uniform(-1,1)) for _ in range(nout)]
    def __call__(self, x):
        outs = [sum((wi*xi for wi,xi in zip(w_row, x)), b) for w_row, b in zip(self.w, self.b)]
        return outs[0] if len(outs) == 1 else outs 
    def parameters(self):
        return [p for row in self.w for p in row] + self.b

class ReLU(Module):
    def __call__(self, x):
        if isinstance(x, list): return [xi.relu() for xi in x]
        return x.relu()
    def parameters(self): return []

class Sequential(Module):
    def __init__(self, *layers): self.layers = layers
    def __call__(self, x):
        for layer in self.layers: x = layer(x)
        return x
    def parameters(self):
        return [p for layer in self.layers for p in layer.parameters()]

class Flatten(Module):
    def __call__(self, x):
        out = []
        for c in x:
            for row in c:
                out.extend(row)
        return out
    def parameters(self): return []

class Conv2d(Module):
    def __init__(self, in_c, out_c, kernel_size):
        self.k = kernel_size
        self.filters = [[[[Value(random.uniform(-0.5,0.5)) for _ in range(kernel_size)] 
                         for _ in range(kernel_size)] 
                        for _ in range(in_c)] for _ in range(out_c)]
    
    def __call__(self, x):
        c_in, h, w = len(x), len(x[0]), len(x[0][0])
        h_out, w_out = h - self.k + 1, w - self.k + 1
        out = []
        for f_idx in range(len(self.filters)): 
            layer_map = []
            for y in range(h_out):
                row = []
                for x_pos in range(w_out):
                    val = Value(0)
                    for c in range(c_in):
                        for ky in range(self.k):
                            for kx in range(self.k):
                                val += x[c][y+ky][x_pos+kx] * self.filters[f_idx][c][ky][kx]
                    row.append(val)
                layer_map.append(row)
            out.append(layer_map)
        return out 
    
    def parameters(self):
        params = []
        for f in self.filters:
            for c in f:
                for row in c:
                    params.extend(row)
        return params
`;

    // --- 4. EDITOR & UI FUNCTIONS ---

    function updateHighlight(text) {
        // escape html
        text = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        // add line break for scrolling sync
        if (text[text.length - 1] === "\n") text += " ";

        els.highlighting.innerHTML = text;
        Prism.highlightElement(els.highlighting);
    }

    function syncScroll(element) {
        const pre = document.getElementById('code-display');
        pre.scrollTop = element.scrollTop;
        pre.scrollLeft = element.scrollLeft;
    }

    function handleTab(e, element) {
        if (e.key === 'Tab') {
            e.preventDefault();
            const start = element.selectionStart;
            const end = element.selectionEnd;
            element.value = element.value.substring(0, start) + "    " + element.value.substring(end);
            element.selectionStart = element.selectionEnd = start + 4;
            updateHighlight(element.value);
        }
    }

    function zoomImage(delta) {
        currentZoom = Math.max(0.5, Math.min(3.0, currentZoom + delta));
        els.imgContainer.style.transform = `scale(${currentZoom})`;
    }

    function renderSidebar() {
        els.demoList.innerHTML = DEMOS.map(demo => `
                <button onclick="selectDemo('${demo.id}')" 
                    class="w-full text-left p-2 rounded-lg transition-all border flex items-start gap-3 demo-btn group hover:border-slate-300 ${demo.id === activeDemoId ? 'bg-blue-50 border-blue-200' : 'bg-white border-transparent'}">
                    <div class="mt-0.5 p-1.5 rounded-md flex-none ${demo.id === activeDemoId ? 'bg-blue-100 text-blue-600' : 'bg-slate-100 text-slate-500 group-hover:bg-slate-200'}">
                        <i data-lucide="${demo.icon}" class="w-4 h-4"></i>

                    <div class="min-w-0">
                        <div class="font-semibold text-xs mb-0.5 truncate ${demo.id === activeDemoId ? 'text-blue-900' : 'text-slate-700'}">${demo.name}</div>
                        <div class="text-[10px] text-slate-500 line-clamp-1">${demo.description}</div>
                    </div>
                </button>
            `).join('');
        lucide.createIcons();
    }

                    </div>
                    <input type="range" id="slider-${s.id}" min="${s.min}" max="${s.max}" step="${s.step}" value="${s.value}"
                        class="w-full h-1 bg-slate-700 rounded-lg appearance-none cursor-pointer"
                        oninput="updateParam('${s.id}', this.value)">
                </div>
            `).join('');
    }

    window.updateParam = function (id, value) {
        document.getElementById(`val-${id}`).innerText = value;
        if (!isPyodideLoading && pyodide) {
            const demo = DEMOS.find(d => d.id === activeDemoId);
            const slider = demo.sliders.find(s => s.id === id);
            if (slider) slider.value = parseFloat(value);
            runSimulation();
        }
    }

    function getHistoryKey(demoId) { return `phd_lab_history_${demoId}`; }

    window.saveSnapshot = function (manual = false) {
        const currentCode = els.editor.value;
        const key = getHistoryKey(activeDemoId);
        let history = JSON.parse(localStorage.getItem(key) || '[]');

        if (history.length > 0 && history[0].code === currentCode) return;

        const snapshot = {
            timestamp: Date.now(),
            code: currentCode,
            manual: manual
        };

        history.unshift(snapshot);
        if (history.length > 20) history.pop();

        localStorage.setItem(key, JSON.stringify(history));
        renderHistory();
    }

    function renderHistory() {
        const key = getHistoryKey(activeDemoId);
        const history = JSON.parse(localStorage.getItem(key) || '[]');

        if (history.length === 0) {
            els.historyList.innerHTML = `<div class="text-[10px] text-slate-400 italic text-center mt-2">No history.</div>`;
            return;
        }

        els.historyList.innerHTML = history.map((snap, i) => {
            const date = new Date(snap.timestamp);
            const timeStr = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            return `
                <button onclick="restoreSnapshot(${i})" class="w-full text-left p-1.5 rounded hover:bg-slate-100 flex justify-between items-center group transition-colors border-b border-slate-50 last:border-0">
                    <div class="flex items-center gap-2">
                        <span class="w-1.5 h-1.5 rounded-full ${snap.manual ? 'bg-green-500' : 'bg-slate-300'}"></span>
                        <div class="text-[10px] text-slate-600 font-mono">
                           ${timeStr}
                        </div>
                    </div>
                    <i data-lucide="rotate-ccw" class="w-3 h-3 text-slate-300 group-hover:text-blue-500"></i>
                </button>
            `;
        }).join('');
        lucide.createIcons();
    }

    window.restoreSnapshot = function (index) {
        const key = getHistoryKey(activeDemoId);
        const history = JSON.parse(localStorage.getItem(key) || '[]');
        if (history[index]) {
            els.editor.value = history[index].code;
            updateHighlight(history[index].code);
            runSimulation();
        }
    }

    window.clearHistory = function () {
        if (confirm("Delete all history for this model?")) {
            const key = getHistoryKey(activeDemoId);
            localStorage.removeItem(key);
            renderHistory();
        }
    }

    function selectDemo(id) {
        activeDemoId = id;
        const demo = DEMOS.find(d => d.id === id);
        loadDemo(demo);
        renderSidebar();
    }

    function loadDemo(demo) {
        els.editor.value = demo.code;
        updateHighlight(demo.code);
        els.img.src = demo.defaultImage;
        els.filename.innerHTML = `<i data-lucide="terminal" class="w-3 h-3 text-blue-400"></i> ${demo.id}.py`;
        els.console.innerText = "";

        renderSliders(demo);
        renderHistory();
        lucide.createIcons();
        switchTab('graph');
    }

    async function initPyodide() {
        try {
            if (window.loadPyodide) { await setupPyodide(); return; }
            const script = document.createElement('script');
            script.src = "https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js";
            script.crossOrigin = "anonymous";
            script.onload = async () => { await setupPyodide(); };
            document.body.appendChild(script);
        } catch (err) { console.error(err); }
    }

    async function setupPyodide() {
        try {
            els.engineStatus.innerText = "Loading WASM...";
            pyodide = await loadPyodide({ stdout: (text) => console.log(text) });
            els.engineStatus.innerText = "Inst. Packages...";
            await pyodide.loadPackage(["numpy", "matplotlib", "sympy"]);

            // Set Matplotlib Backend to Agg to prevent GUI errors
            await pyodide.runPythonAsync(`
import matplotlib
matplotlib.use("Agg")
                `);

            els.engineStatus.innerText = "Loading Libs...";
            await pyodide.runPythonAsync(HIDDEN_LIB);
            els.engineStatus.innerText = "Ready";
            els.engineStatus.classList.replace('text-yellow-400', 'text-green-400');
            isPyodideLoading = false;
        } catch (err) { console.error(err); }
    }

    async function runSimulation() {
        if (!pyodide || isPyodideLoading) return;

        els.runBtn.disabled = true;
        els.runBtnText.innerText = "...";
        els.outputLoader.classList.remove('hidden');
        els.console.innerHTML = "";

        const code = els.editor.value;
        const demo = DEMOS.find(d => d.id === activeDemoId);

        try {
            pyodide.setStdout({
                batched: (msg) => {
                    const line = document.createElement('div');
                    line.className = "mb-1 border-b border-slate-50 pb-1";
                    line.innerText = msg;
                    els.console.appendChild(line);
                }
            });

            if (demo.sliders) {
                let paramPy = "params = {";
                demo.sliders.forEach(s => { paramPy += `'${s.id}': ${s.value},`; });
                paramPy += "}";
                await pyodide.runPythonAsync(paramPy);
            }

            await pyodide.loadPackagesFromImports(code);

            // Clear any previous plot URL in Python state
            pyodide.runPython("plot_url = ''");

            await pyodide.runPythonAsync(code);

            // Explicitly check for the global variable 'plot_url'
            const plotUrl = pyodide.globals.get('plot_url');

            if (plotUrl && plotUrl.startsWith('data:image')) {
                els.img.src = plotUrl;
                switchTab('graph');
            }

        } catch (err) {
            const errLine = document.createElement('div');
            errLine.className = "text-red-600 font-bold mb-1";
            errLine.innerText = "Runtime Error: " + err.message;
            els.console.appendChild(errLine);
            switchTab('console');
        } finally {
            els.runBtn.disabled = false;
            els.runBtnText.innerText = "Run";
            els.outputLoader.classList.add('hidden');
        }
    }

    window.downloadImage = function () {
        const img = document.getElementById('output-image');
        if (img.src && img.src.startsWith('data:image')) {
            const a = document.createElement('a');
            a.href = img.src;
            a.download = `simulation.png`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }
    }

    window.downloadCSV = async function () {
        if (!pyodide) return;
        try {
            const csvContent = pyodide.globals.get('csv_data');
            if (csvContent && csvContent.length > 5 && !csvContent.startsWith("No CSV")) {
                const blob = new Blob([csvContent], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `data.csv`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            } else { alert("No CSV data generated."); }
        } catch (e) { console.error(e); }
    }

    window.selectDemo = selectDemo;

    window.switchTab = function (tab) {
        const graphView = document.getElementById('view-graph');
        const consoleView = document.getElementById('view-console');
        const tabGraph = document.getElementById('tab-graph');
        const tabConsole = document.getElementById('tab-console');

        if (tab === 'graph') {
            graphView.classList.remove('hidden');
            consoleView.classList.add('hidden');
            tabGraph.classList.add('text-blue-600', 'border-blue-600', 'bg-white');
            tabGraph.classList.remove('text-slate-500');
            tabConsole.classList.remove('text-blue-600', 'border-blue-600', 'bg-white');
            tabConsole.classList.add('text-slate-500');
        } else {
            graphView.classList.add('hidden');
            consoleView.classList.remove('hidden');
            tabConsole.classList.add('text-blue-600', 'border-blue-600', 'bg-white');
            tabConsole.classList.remove('text-slate-500');
            tabGraph.classList.remove('text-blue-600', 'border-blue-600', 'bg-white');
            tabGraph.classList.add('text-slate-500');
        }
    }
</script>
